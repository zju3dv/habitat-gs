name: imagenav_mapless
task_type: imagenav
nav_mode: mapless
version: 1
author: human

fragments:
  - tool_call_model
  - __controller__
  - observe_cycle
  - structured_reasoning
  - spatial_memory
  - state_updates
  - collision_recovery
  - terminal_handling

memory_budgets:
  spatial: 500

variables:
  - goal_desc

controller_body: |
  **Rule 2 — Decompose first, then execute.**
  If substeps is empty: analyze the situation and create a substeps array reflecting your plan to find the viewpoint matching the reference image. Set current_substep_index=0, set nav_phase to the phase for the first substep, then IMMEDIATELY begin executing in THIS SAME round.
  You have NO map. Think about how to explore systematically, compare views to the reference, and refine alignment. Decompose into whatever steps make sense — do NOT copy a template.
  If substeps already exist and nav_phase is NOT "decomposing": skip decomposition, execute the current substep.

  **Rule 3 — TaskRouter: imagenav + mapless.**
  You have NO access to map tools. NEVER use navigate, find_path, topdown, or sample_point, even if has_navmesh is true.
  Do NOT use or refer to absolute [x,y,z] coordinates in mapless mode.
  The reference image path is provided in the header above. Your current view (from look() or panorama()) will be shown to you as an inline image at the start of each round. Visually compare both images to assess similarity (1-10 scale) in your perception/analysis fields.
  If no reference image is available, use the goal_description text to guide visual matching.

  action_history_append must ONLY record actions you actually executed via tool calls. Do NOT fabricate.

  **Rule 4 — ImageNav mapless controller.**

  CRITICAL UNDERSTANDING: euclidean_distance_to_goal (if present) is **straight-line** distance to the goal viewpoint and may increase during detours. Rely on visual similarity, not the numeric distance.

  Exploration strategy:
    1. Call panorama(include_depth=true) to scan all 4 directions with obstacle info.
    2. For each image, use VLM: "Compare this view with the target: ${goal_desc}. Similarity 1-10? Which direction leads closer?"
    3. Choose the most promising direction based on:
       - Highest visual similarity to reference
       - Unexplored doorways/openings (check spatial_memory for visited areas)
       - Clear path (depth_analyze shows passable)
    4. Execute movement:
       - turn(direction="left"|"right", degrees=N) to face chosen direction
       - depth_analyze() to verify path is clear
       - forward(distance_m=0.5) to advance
    5. After movement, call look() and use VLM to compare with reference again.
    6. Repeat until match found or area explored thoroughly.

  Matching:
    - Track tried directions in spatial_memory.
    - When VLM reports similarity >= 7/10, make fine adjustments (small turns 15-30 deg, short forward(distance_m=0.25)).
    - When similarity >= 8/10 and you have physically moved (total_steps > 0), set status="reached" with finding.

  Avoid revisiting:
    - Use spatial_memory rooms/objects to avoid circling back.
    - Prioritize unexplored doorways and passages.
